<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Body Percussion Sequencer</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #ffffff; --surface: #f4f4f6; --surface2: #e8e8ee;
  --border: rgba(0,0,0,0.10); --border2: rgba(0,0,0,0.20);
  --text: #111118; --muted: #888898;
  --c0: #1a7fe0; --c0d: #ddeeff; --c1: #12a05a; --c1d: #d5f5e5;
  --c2: #d95b20; --c2d: #fde8dc; --c3: #8b34c8; --c3d: #eddefa;
  --c4: #c0392b; --c4d: #fde0de; --c5: #b07d10; --c5d: #fdf3d5;
  --radius: 8px; --step-h: 48px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #16161e; --surface: #21212e; --surface2: #2c2c3c;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.16);
    --text: #f0f0f8; --muted: #888898;
    --c0d: #0a2a48; --c1d: #082a1a; --c2d: #3a1a08;
    --c3d: #220a38; --c4d: #380a08; --c5d: #2e200a;
  }
}
body {
  background: var(--bg); color: var(--text);
  font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
  min-height: 100dvh; display: flex; flex-direction: column; align-items: center;
  padding: 20px 12px 36px; -webkit-tap-highlight-color: transparent; overscroll-behavior: none;
}
.app { width: 100%; max-width: 1080px; }
header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 18px; border-bottom: 1.5px solid var(--border);
  padding-bottom: 12px; gap: 12px; flex-wrap: wrap;
}
.title-input {
  font-size: 18px; font-weight: 700; border: 1.5px solid transparent;
  background: transparent; color: var(--text); outline: none;
  padding: 4px 8px; border-radius: 7px; min-width: 0; flex: 1;
}
.title-input:hover, .title-input:focus { background: var(--surface); border-color: var(--border2); }
.header-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.voices-ctrl { display: flex; align-items: center; gap: 7px; }
.ctrl-label { font-size: 11px; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase; color: var(--muted); white-space: nowrap; }
.num-btns { display: flex; gap: 3px; }
.num-btn {
  width: 28px; height: 28px; border-radius: 6px; border: 1.5px solid var(--border2);
  background: transparent; color: var(--muted); font-size: 13px; font-weight: 700;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.1s; touch-action: manipulation;
}
.num-btn:hover { color: var(--text); border-color: var(--text); }
.num-btn.active { background: var(--text); border-color: var(--text); color: var(--bg); }
.controls { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin-bottom: 20px; }
.play-btn {
  width: 54px; height: 54px; border-radius: 50%; border: 2px solid var(--text);
  background: var(--text); color: var(--bg); font-size: 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: opacity 0.15s, transform 0.1s; flex-shrink: 0; touch-action: manipulation;
}
.play-btn:active { transform: scale(0.90); }
.play-btn.running { background: #c0392b; border-color: #c0392b; }
.bpm-group { display: flex; align-items: center; gap: 10px; }
.bpm-value { font-size: 26px; font-weight: 700; min-width: 44px; }
input[type=range] {
  -webkit-appearance: none; width: 120px; height: 4px;
  background: var(--surface2); border-radius: 2px; outline: none; cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%;
  background: var(--text); cursor: pointer;
}
input[type=range]::-moz-range-thumb {
  width: 22px; height: 22px; border-radius: 50%; background: var(--text); border: none;
}
.steps-ctrl { display: flex; align-items: center; gap: 8px; }
.step-btns { display: flex; gap: 3px; }
.step-btn {
  padding: 6px 10px; border-radius: 7px; border: 1.5px solid var(--border2);
  background: transparent; color: var(--muted); font-size: 13px; font-weight: 700;
  cursor: pointer; transition: all 0.1s; touch-action: manipulation;
}
.step-btn:hover { color: var(--text); border-color: var(--text); }
.step-btn.active { background: var(--text); border-color: var(--text); color: var(--bg); }
.subdiv-group { display: flex; align-items: center; gap: 8px; margin-left: auto; flex-wrap: wrap; }
.subdiv-btns { display: flex; gap: 4px; }
.subdiv-btn {
  padding: 6px 12px; border-radius: 7px; border: 1.5px solid var(--border2);
  background: transparent; color: var(--muted); font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.12s; touch-action: manipulation;
}
.subdiv-btn:hover { color: var(--text); border-color: var(--text); }
.subdiv-btn.active { background: var(--text); border-color: var(--text); color: var(--bg); }
.metro-section {
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 10px; overflow-x: auto; -webkit-overflow-scrolling: touch;
}
.metro-label { width: 100px; flex-shrink: 0; }
.metro-dots { display: flex; gap: 4px; flex: 1; align-items: center; min-width: 0; }
.metro-sep { width: 1px; height: 14px; background: var(--border2); flex-shrink: 0; margin: 0 2px; }
.metro-dot {
  width: 12px; height: 12px; border-radius: 50%;
  background: var(--surface2); border: 1.5px solid var(--border2);
  transition: background 0.05s; flex-shrink: 0;
}
.metro-dot.on { background: #555; }
.metro-dot.beat1.on { background: #c0392b; box-shadow: 0 0 8px rgba(192,57,43,0.5); }
.voices { display: flex; flex-direction: column; gap: 7px; }
.voice-row { display: flex; align-items: center; gap: 8px; }
.voice-name-wrap { width: 100px; flex-shrink: 0; text-align: right; }
.voice-name {
  font-size: 13px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
  border: 1.5px solid transparent; background: transparent;
  text-align: right; width: 100%; outline: none; cursor: text;
  padding: 4px 6px; border-radius: 6px; color: inherit;
}
.voice-name:hover, .voice-name:focus { background: var(--surface); border-color: var(--border2); }
.steps-row {
  display: flex; gap: 3px; flex: 1; align-items: center;
  overflow-x: auto; -webkit-overflow-scrolling: touch; min-width: 0; padding-bottom: 2px;
}
.step-sep { width: 1px; height: var(--step-h); background: var(--border2); flex-shrink: 0; margin: 0 1px; }
.step {
  flex: 1; min-width: 28px; height: var(--step-h); border-radius: var(--radius);
  border: 2px solid; cursor: pointer; flex-shrink: 0;
  transition: opacity 0.1s, transform 0.07s; touch-action: manipulation;
}
.step:active { transform: scale(0.88); }
.step.off { opacity: 0.15; }
.step.on  { opacity: 1; }
.step.cursor { outline: 3px solid var(--text); outline-offset: 2px; }
.vr0 .voice-name{color:var(--c0)}.vr0 .step{background:var(--c0d);border-color:var(--c0)}.vr0 .step.on{background:var(--c0);box-shadow:0 2px 8px rgba(26,127,224,.4)}
.vr1 .voice-name{color:var(--c1)}.vr1 .step{background:var(--c1d);border-color:var(--c1)}.vr1 .step.on{background:var(--c1);box-shadow:0 2px 8px rgba(18,160,90,.4)}
.vr2 .voice-name{color:var(--c2)}.vr2 .step{background:var(--c2d);border-color:var(--c2)}.vr2 .step.on{background:var(--c2);box-shadow:0 2px 8px rgba(217,91,32,.4)}
.vr3 .voice-name{color:var(--c3)}.vr3 .step{background:var(--c3d);border-color:var(--c3)}.vr3 .step.on{background:var(--c3);box-shadow:0 2px 8px rgba(139,52,200,.4)}
.vr4 .voice-name{color:var(--c4)}.vr4 .step{background:var(--c4d);border-color:var(--c4)}.vr4 .step.on{background:var(--c4);box-shadow:0 2px 8px rgba(192,57,43,.4)}
.vr5 .voice-name{color:var(--c5)}.vr5 .step{background:var(--c5d);border-color:var(--c5)}.vr5 .step.on{background:var(--c5);box-shadow:0 2px 8px rgba(176,125,16,.4)}
.clear-btn {
  padding: 5px 10px; border-radius: 7px; border: 1.5px solid var(--border2);
  background: transparent; color: var(--muted); font-size: 12px; font-weight: 600;
  cursor: pointer; flex-shrink: 0; transition: all 0.1s; touch-action: manipulation;
}
.clear-btn:hover { border-color: #c0392b; color: #c0392b; }
@media (max-width: 600px) {
  :root { --step-h: 40px; }
  body { padding: 14px 8px 28px; }
  .voice-name-wrap { width: 72px; }
  .voice-name { font-size: 11px; }
  .bpm-value { font-size: 22px; }
  input[type=range] { width: 90px; }
  .controls { gap: 10px; }
  .play-btn { width: 48px; height: 48px; font-size: 18px; }
  .subdiv-btn, .step-btn { font-size: 11px; padding: 5px 8px; }
  .metro-label { width: 72px; }
  .title-input { font-size: 16px; }
}
@media (max-width: 400px) { .subdiv-group { margin-left: 0; } }
::-webkit-scrollbar { height: 3px; width: 3px; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>
<body>
<div class="app">
  <header>
    <input class="title-input" id="titleInput" type="text" value="🥁 Body Percussion Sequencer" maxlength="60">
    <div class="header-right">
      <div class="voices-ctrl">
        <span class="ctrl-label">voci</span>
        <div class="num-btns" id="voicesBtns"></div>
      </div>
    </div>
  </header>
  <div class="controls">
    <button class="play-btn" id="playBtn" aria-label="Play/Stop">▶</button>
    <div class="bpm-group">
      <span class="ctrl-label">BPM</span>
      <input type="range" id="bpmSlider" min="40" max="160" value="80" step="1">
      <span class="bpm-value" id="bpmVal">80</span>
    </div>
    <div class="steps-ctrl">
      <span class="ctrl-label">battute</span>
      <div class="step-btns" id="stepBtns"></div>
    </div>
    <div class="subdiv-group">
      <span class="ctrl-label">suddivisione</span>
      <div class="subdiv-btns" id="subdivBtns">
        <button class="subdiv-btn active" data-s="1">♩ quarti</button>
        <button class="subdiv-btn" data-s="2">♪ ottavi</button>
        <button class="subdiv-btn" data-s="3">♩. terzine</button>
      </div>
    </div>
  </div>
  <div class="metro-section">
    <div class="metro-label"></div>
    <div class="metro-dots" id="metro"></div>
    <div style="width:60px;flex-shrink:0"></div>
  </div>
  <div class="voices" id="voices"></div>
</div>

// Pool di elementi audio per evitare di aspettare che il suono finisca
function makePool(src, size) {
  const pool = [];
  for (let i = 0; i < size; i++) {
    const a = new Audio(src);
    a.preload = 'auto';
    pool.push(a);
  }
  let idx = 0;
  return () => {
    const a = pool[idx % size];
    idx++;
    a.currentTime = 0;
    a.play().catch(() => {});
  };
}

let playAccent = null;
let playClick  = null;

// Li creiamo al primo click (dentro evento utente) per iOS
function initAudio() {
  if (playAccent) return; // già inizializzati
  playAccent = makePool(ACCENT_WAV, 4);
  playClick  = makePool(CLICK_WAV, 4);
  // warm-up silenzioso per iOS
  const dummy = new Audio(ACCENT_WAV);
  dummy.volume = 0;
  dummy.play().catch(() => {});
  initAudio = () => {}; // esegui solo una volta
}

function doSound(accent) {
  if (!playAccent) return;
  if (accent) playAccent();
  else playClick();
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function stepsPerBeat(){return subdiv===1?4:subdiv===2?8:12;}
function totalSteps(){return stepsPerBeat()*numBeats;}
function stepsPerTempo(){return subdiv;}
function stepMs(){return(60000/bpm)/subdiv;}

// ── Render ───────────────────────────────────────────────────────────────────
function renderVoiceBtns(){
  const c=document.getElementById('voicesBtns'); c.innerHTML='';
  for(let n=1;n<=MAX_VOICES;n++){
    const b=document.createElement('button');
    b.className='num-btn'+(n===numVoices?' active':'');
    b.textContent=n;
    b.onclick=()=>{numVoices=n;renderVoiceBtns();renderVoices();};
    c.appendChild(b);
  }
}

function renderStepBtns(){
  const c=document.getElementById('stepBtns'); c.innerHTML='';
  BEATS_OPTIONS.forEach(n=>{
    const b=document.createElement('button');
    b.className='step-btn'+(n===numBeats?' active':'');
    b.textContent=n;
    b.onclick=()=>{stop();numBeats=n;renderStepBtns();renderMetro();renderVoices();};
    c.appendChild(b);
  });
}

function renderMetro(){
  const c=document.getElementById('metro'); c.innerHTML='';
  const ts=totalSteps(),spt=stepsPerTempo(),spb=stepsPerBeat();
  for(let si=0;si<ts;si++){
    if(si>0&&si%spb===0){
      const s=document.createElement('div');
      s.className='metro-sep';s.style.cssText='height:18px;background:rgba(0,0,0,0.35);width:2px';
      c.appendChild(s);
    } else if(si>0&&si%spt===0){
      const s=document.createElement('div');s.className='metro-sep';c.appendChild(s);
    }
    const d=document.createElement('div');
    const isBD=si%spb===0;
    d.className='metro-dot'+(isBD?' beat1':'');
    if(isBD&&si>0)d.style.borderColor='rgba(0,0,0,0.4)';
    d.id='mdot-'+si; c.appendChild(d);
  }
}

function renderVoices(){
  const c=document.getElementById('voices'); c.innerHTML='';
  const ts=totalSteps(),spt=stepsPerTempo(),spb=stepsPerBeat();
  for(let vi=0;vi<numVoices;vi++){
    const row=document.createElement('div'); row.className='voice-row vr'+vi;
    const nw=document.createElement('div'); nw.className='voice-name-wrap';
    const inp=document.createElement('input');
    inp.type='text';inp.className='voice-name';inp.value=voiceNames[vi];inp.maxLength=14;
    inp.addEventListener('change',()=>{voiceNames[vi]=inp.value.trim()||voiceNames[vi];inp.value=voiceNames[vi];});
    inp.addEventListener('keydown',e=>{if(e.key==='Enter')inp.blur();});
    nw.appendChild(inp); row.appendChild(nw);
    const sr=document.createElement('div'); sr.className='steps-row';
    for(let si=0;si<ts;si++){
      if(si>0&&si%spb===0){
        const s=document.createElement('div');s.className='step-sep';s.style.cssText='width:2px;background:rgba(0,0,0,0.3)';sr.appendChild(s);
      } else if(si>0&&si%spt===0){
        const s=document.createElement('div');s.className='step-sep';sr.appendChild(s);
      }
      const cell=document.createElement('div');
      cell.className='step '+(grid[vi][si]?'on':'off');
      cell.id='c-'+vi+'-'+si;
      cell.onclick=()=>toggle(vi,si);
      sr.appendChild(cell);
    }
    const clr=document.createElement('button');
    clr.className='clear-btn';clr.textContent='✕';clr.title='Svuota voce';
    clr.onclick=()=>{grid[vi]=Array(48).fill(false);renderVoices();};
    row.appendChild(sr); row.appendChild(clr); c.appendChild(row);
  }
}

function toggle(vi,si){
  grid[vi][si]=!grid[vi][si];
  const c=document.getElementById('c-'+vi+'-'+si);
  if(c){c.classList.toggle('on',grid[vi][si]);c.classList.toggle('off',!grid[vi][si]);}
}

// ── Sequencer ────────────────────────────────────────────────────────────────
function tick(){
  const ts=totalSteps(),spt=stepsPerTempo(),spb=stepsPerBeat();
  const prev=(currentStep-1+ts)%ts;
  for(let vi=0;vi<numVoices;vi++){const e=document.getElementById('c-'+vi+'-'+prev);if(e)e.classList.remove('cursor');}
  const pd=document.getElementById('mdot-'+prev); if(pd)pd.classList.remove('on');
  const isBD=currentStep%spb===0;
  const isTD=currentStep%spt===0;
  if(isBD)doSound(true); else if(isTD)doSound(false);
  for(let vi=0;vi<numVoices;vi++){const e=document.getElementById('c-'+vi+'-'+currentStep);if(e)e.classList.add('cursor');}
  const cd=document.getElementById('mdot-'+currentStep); if(cd)cd.classList.add('on');
  currentStep=(currentStep+1)%ts;
}

function startLoop(){tick();timerId=setInterval(tick,stepMs());}
function stopLoop(){
  clearInterval(timerId);timerId=null;
  const ts=totalSteps();
  for(let vi=0;vi<numVoices;vi++)for(let si=0;si<ts;si++){const e=document.getElementById('c-'+vi+'-'+si);if(e)e.classList.remove('cursor');}
  for(let si=0;si<ts;si++){const d=document.getElementById('mdot-'+si);if(d)d.classList.remove('on');}
}
function stop(){
  if(!playing)return;
  playing=false;stopLoop();
  document.getElementById('playBtn').textContent='▶';
  document.getElementById('playBtn').classList.remove('running');
}

function togglePlay(){
  initAudio(); // crea i pool audio QUI, dentro il click
  playing=!playing;
  const btn=document.getElementById('playBtn');
  if(playing){btn.textContent='■';btn.classList.add('running');currentStep=0;startLoop();}
  else{btn.textContent='▶';btn.classList.remove('running');stopLoop();}
}

function setBpm(v){
  bpm=parseInt(v);
  document.getElementById('bpmVal').textContent=bpm;
  if(playing){stopLoop();currentStep=0;startLoop();}
}

function setSubdiv(n){
  stop();subdiv=n;
  document.querySelectorAll('.subdiv-btn').forEach(b=>b.classList.toggle('active',parseInt(b.dataset.s)===n));
  currentStep=0;renderMetro();renderVoices();
}

// Event listeners
document.getElementById('playBtn').addEventListener('click',togglePlay);
document.getElementById('bpmSlider').addEventListener('input',function(){setBpm(this.value);});
document.querySelectorAll('.subdiv-btn').forEach(b=>b.addEventListener('click',()=>setSubdiv(parseInt(b.dataset.s))));

// Blocca zoom doppio tap iOS
let lastTap=0;
document.addEventListener('touchend',function(e){
  const now=Date.now();if(now-lastTap<300)e.preventDefault();lastTap=now;
},{passive:false});

renderVoiceBtns();
renderStepBtns();
renderMetro();
renderVoices();
</script>
