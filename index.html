<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Body Percussion Sequencer</title>

<style>
*, *::before, *::after{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

:root{
  --bg:#ffffff;
  --surface:#f4f4f6;
  --surface2:#e8e8ee;
  --border:rgba(0,0,0,.10);
  --border2:rgba(0,0,0,.20);
  --text:#111118;
  --muted:#7f7f8f;

  --c0:#1a7fe0; --c0d:#ddeeff;
  --c1:#12a05a; --c1d:#d5f5e5;
  --c2:#d95b20; --c2d:#fde8dc;
  --c3:#8b34c8; --c3d:#eddefa;
  --c4:#c0392b; --c4d:#fde0de;
  --c5:#b07d10; --c5d:#fdf3d5;

  --radius:10px;
  --step-h:52px;
}

@media (prefers-color-scheme: dark){
  :root{
    --bg:#15161d;
    --surface:#21232d;
    --surface2:#2a2d39;
    --border:rgba(255,255,255,.08);
    --border2:rgba(255,255,255,.16);
    --text:#f5f5fa;

    --c0d:#0d2d4b;
    --c1d:#0d3321;
    --c2d:#43200e;
    --c3d:#2e1345;
    --c4d:#40130e;
    --c5d:#41320d;
  }
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
  min-height:100dvh;
  padding:18px 12px 40px;
  display:flex;
  justify-content:center;
  -webkit-tap-highlight-color:transparent;
}

.app{
  width:100%;
  max-width:1100px;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:18px;
  border-bottom:1px solid var(--border);
  padding-bottom:14px;
  flex-wrap:wrap;
}

.title-input{
  background:transparent;
  border:none;
  color:var(--text);
  font-size:20px;
  font-weight:800;
  outline:none;
  flex:1;
}

.header-right{
  display:flex;
  gap:8px;
  align-items:center;
}

.ctrl-label{
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:.08em;
  font-weight:800;
  color:var(--muted);
}

.num-btns,
.step-btns,
.subdiv-btns{
  display:flex;
  gap:4px;
}

.num-btn,
.step-btn,
.subdiv-btn,
.clear-btn{
  border:1.5px solid var(--border2);
  background:transparent;
  color:var(--muted);
  border-radius:8px;
  cursor:pointer;
  transition:.12s;
  font-weight:700;
}

.num-btn{
  width:30px;
  height:30px;
}

.step-btn,
.subdiv-btn{
  padding:7px 12px;
}

.clear-btn{
  padding:5px 10px;
}

.num-btn.active,
.step-btn.active,
.subdiv-btn.active{
  background:var(--text);
  color:var(--bg);
  border-color:var(--text);
}

.controls{
  display:flex;
  gap:16px;
  align-items:center;
  flex-wrap:wrap;
  margin-bottom:20px;
}

.play-btn{
  width:58px;
  height:58px;
  border-radius:50%;
  border:none;
  background:var(--text);
  color:var(--bg);
  font-size:22px;
  cursor:pointer;
  font-weight:700;
  transition:.12s;
}

.play-btn:active{
  transform:scale(.92);
}

.play-btn.running{
  background:#c0392b;
}

.bpm-group{
  display:flex;
  align-items:center;
  gap:10px;
}

.bpm-value{
  font-size:28px;
  font-weight:800;
  min-width:48px;
}

input[type=range]{
  width:120px;
}

.metro-section{
  display:flex;
  gap:8px;
  align-items:center;
  margin-bottom:12px;
}

.metro-label{
  width:100px;
}

.metro-dots{
  display:flex;
  gap:4px;
}

.metro-dot{
  width:12px;
  height:12px;
  border-radius:50%;
  background:var(--surface2);
  border:1px solid var(--border2);
  transition:.05s;
}

.metro-dot.on{
  background:#666;
}

.metro-dot.beat1.on{
  background:#c0392b;
  box-shadow:0 0 12px rgba(192,57,43,.8);
}

.voices{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.voice-row{
  display:flex;
  gap:8px;
  align-items:center;
}

.voice-name-wrap{
  width:100px;
}

.voice-name{
  width:100%;
  background:transparent;
  border:none;
  color:inherit;
  text-align:right;
  font-size:13px;
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:.04em;
  outline:none;
}

.steps-row{
  flex:1;
  display:flex;
  gap:4px;
  align-items:center;
  overflow-x:auto;
}

.step-sep{
  width:2px;
  height:var(--step-h);
  background:var(--border2);
  flex-shrink:0;
}

.step{
  min-width:30px;
  height:var(--step-h);
  border-radius:var(--radius);
  border:2px solid;
  cursor:pointer;
  transition:
    transform .08s,
    opacity .08s,
    box-shadow .08s,
    filter .08s;
  flex:1;
}

.step:active{
  transform:scale(.9);
}

.step.off{
  opacity:.18;
}

.step.on{
  opacity:1;
}

/* cursore normale */
.step.cursor{
  outline:3px solid var(--text);
  outline-offset:2px;
}

/* NUOVO: step triggerato */
.step.flash{
  transform:scale(1.08);
  filter:brightness(1.35);
  box-shadow:
    0 0 0 3px rgba(255,255,255,.25),
    0 0 18px rgba(255,255,255,.65);
}

/* colori */

.vr0 .voice-name{ color:var(--c0); }
.vr0 .step{ background:var(--c0d); border-color:var(--c0); }
.vr0 .step.on{ background:var(--c0); }

.vr1 .voice-name{ color:var(--c1); }
.vr1 .step{ background:var(--c1d); border-color:var(--c1); }
.vr1 .step.on{ background:var(--c1); }

.vr2 .voice-name{ color:var(--c2); }
.vr2 .step{ background:var(--c2d); border-color:var(--c2); }
.vr2 .step.on{ background:var(--c2); }

.vr3 .voice-name{ color:var(--c3); }
.vr3 .step{ background:var(--c3d); border-color:var(--c3); }
.vr3 .step.on{ background:var(--c3); }

.vr4 .voice-name{ color:var(--c4); }
.vr4 .step{ background:var(--c4d); border-color:var(--c4); }
.vr4 .step.on{ background:var(--c4); }

.vr5 .voice-name{ color:var(--c5); }
.vr5 .step{ background:var(--c5d); border-color:var(--c5); }
.vr5 .step.on{ background:var(--c5); }

@media(max-width:700px){

  :root{
    --step-h:42px;
  }

  .voice-name-wrap{
    width:72px;
  }

  .voice-name{
    font-size:11px;
  }

  .play-btn{
    width:50px;
    height:50px;
    font-size:18px;
  }

  .step{
    min-width:26px;
  }

  .title-input{
    font-size:17px;
  }
}
</style>
</head>

<body>

<div class="app">

<header>
  <input class="title-input" value="🥁 Body Percussion Sequencer" maxlength="60"/>

  <div class="header-right">

    <span class="ctrl-label">voci</span>
    <div class="num-btns" id="voicesBtns"></div>

  </div>
</header>

<div class="controls">

  <button class="play-btn" id="playBtn">▶</button>

  <div class="bpm-group">
    <span class="ctrl-label">BPM</span>

    <input type="range" id="bpmSlider" min="40" max="160" value="80"/>

    <span class="bpm-value" id="bpmVal">80</span>
  </div>

  <div class="steps-ctrl">
    <span class="ctrl-label">battute</span>
    <div class="step-btns" id="stepBtns"></div>
  </div>

  <div class="subdiv-group">

    <span class="ctrl-label">suddivisione</span>

    <div class="subdiv-btns">
      <button class="subdiv-btn active" data-s="1">♩ quarti</button>
      <button class="subdiv-btn" data-s="2">♪ ottavi</button>
      <button class="subdiv-btn" data-s="3">♩. terzine</button>
    </div>

  </div>
</div>

<div class="metro-section">
  <div class="metro-label"></div>
  <div class="metro-dots" id="metro"></div>
</div>

<div class="voices" id="voices"></div>

</div>

<script>
const DEFAULT_NAMES = ['mani','piedi','voce','schiocco','ginocchia','petto'];

const MAX_VOICES = 6;
const BEATS_OPTIONS = [1,2,3,4];

let numVoices = 3;
let numBeats = 2;
let subdiv = 1;
let bpm = 80;

let playing = false;
let currentStep = 0;
let timerId = null;

let voiceNames = [...DEFAULT_NAMES];

let grid = Array.from(
  {length:MAX_VOICES},
  () => Array(48).fill(false)
);

/* AUDIO */

let audioCtx = null;

function getCtx(){

  if(!audioCtx){

    audioCtx = new (
      window.AudioContext ||
      window.webkitAudioContext
    )();

  }

  return audioCtx;
}

/* iPhone FIX */

async function unlockAudio(){

  const ctx = getCtx();

  if(ctx.state !== 'running'){
    await ctx.resume();
  }

  /* suono silenzioso per "sbloccare" iOS */
  const buffer = ctx.createBuffer(1,1,22050);
  const src = ctx.createBufferSource();
  src.buffer = buffer;
  src.connect(ctx.destination);
  src.start(0);
}

function playClick(accent=false){

  if(!audioCtx) return;

  const ctx = audioCtx;

  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  osc.connect(gain);
  gain.connect(ctx.destination);

  osc.type = accent ? 'triangle' : 'square';

  osc.frequency.value = accent ? 1500 : 950;

  gain.gain.setValueAtTime(
    accent ? 0.18 : 0.11,
    ctx.currentTime
  );

  gain.gain.exponentialRampToValueAtTime(
    0.0001,
    ctx.currentTime + 0.07
  );

  osc.start();
  osc.stop(ctx.currentTime + 0.07);
}

/* HELPERS */

function stepsPerBeat(){
  return subdiv === 1 ? 4 : subdiv === 2 ? 8 : 12;
}

function totalSteps(){
  return stepsPerBeat() * numBeats;
}

function stepsPerTempo(){
  return subdiv;
}

function stepMs(){
  return (60000 / bpm) / subdiv;
}

/* RENDER */

function renderVoiceBtns(){

  const cont = document.getElementById('voicesBtns');

  cont.innerHTML = '';

  for(let n=1; n<=MAX_VOICES; n++){

    const b = document.createElement('button');

    b.className =
      'num-btn' + (n === numVoices ? ' active' : '');

    b.textContent = n;

    b.onclick = () => {

      numVoices = n;

      renderVoiceBtns();
      renderVoices();
    };

    cont.appendChild(b);
  }
}

function renderStepBtns(){

  const cont = document.getElementById('stepBtns');

  cont.innerHTML = '';

  BEATS_OPTIONS.forEach(n => {

    const b = document.createElement('button');

    b.className =
      'step-btn' + (n === numBeats ? ' active' : '');

    b.textContent = n;

    b.onclick = () => {

      stop();

      numBeats = n;

      renderStepBtns();
      renderMetro();
      renderVoices();
    };

    cont.appendChild(b);
  });
}

function renderMetro(){

  const cont = document.getElementById('metro');

  cont.innerHTML = '';

  const ts = totalSteps();
  const spt = stepsPerTempo();
  const spb = stepsPerBeat();

  for(let si=0; si<ts; si++){

    if(si>0 && si % spb === 0){

      const sep = document.createElement('div');
      sep.className = 'step-sep';
      cont.appendChild(sep);

    }else if(si>0 && si % spt === 0){

      const sep = document.createElement('div');
      sep.className = 'step-sep';
      sep.style.width = '1px';
      cont.appendChild(sep);
    }

    const d = document.createElement('div');

    d.className =
      'metro-dot' +
      (si % spb === 0 ? ' beat1' : '');

    d.id = 'mdot-' + si;

    cont.appendChild(d);
  }
}

function renderVoices(){

  const cont = document.getElementById('voices');

  cont.innerHTML = '';

  const ts = totalSteps();
  const spt = stepsPerTempo();
  const spb = stepsPerBeat();

  for(let vi=0; vi<numVoices; vi++){

    const row = document.createElement('div');
    row.className = 'voice-row vr' + vi;

    const wrap = document.createElement('div');
    wrap.className = 'voice-name-wrap';

    const inp = document.createElement('input');

    inp.className = 'voice-name';
    inp.value = voiceNames[vi];
    inp.maxLength = 14;

    inp.onchange = () => {
      voiceNames[vi] = inp.value;
    };

    wrap.appendChild(inp);

    row.appendChild(wrap);

    const stepsRow = document.createElement('div');
    stepsRow.className = 'steps-row';

    for(let si=0; si<ts; si++){

      if(si>0 && si % spb === 0){

        const sep = document.createElement('div');
        sep.className = 'step-sep';

        stepsRow.appendChild(sep);

      }else if(si>0 && si % spt === 0){

        const sep = document.createElement('div');
        sep.className = 'step-sep';
        sep.style.width = '1px';

        stepsRow.appendChild(sep);
      }

      const cell = document.createElement('div');

      cell.className =
        'step ' + (grid[vi][si] ? 'on' : 'off');

      cell.id = `c-${vi}-${si}`;

      cell.onclick = () => toggle(vi,si);

      stepsRow.appendChild(cell);
    }

    const clr = document.createElement('button');

    clr.className = 'clear-btn';
    clr.textContent = '✕';

    clr.onclick = () => {

      grid[vi] = Array(48).fill(false);

      renderVoices();
    };

    row.appendChild(stepsRow);
    row.appendChild(clr);

    cont.appendChild(row);
  }
}

function toggle(vi,si){

  grid[vi][si] = !grid[vi][si];

  const c = document.getElementById(`c-${vi}-${si}`);

  c.classList.toggle('on',grid[vi][si]);
  c.classList.toggle('off',!grid[vi][si]);
}

/* FLASH */

function flashStep(el){

  if(!el) return;

  el.classList.add('flash');

  setTimeout(() => {
    el.classList.remove('flash');
  },120);
}

/* SEQUENCER */

function tick(){

  const ts = totalSteps();
  const spt = stepsPerTempo();
  const spb = stepsPerBeat();

  const prev =
    (currentStep - 1 + ts) % ts;

  for(let vi=0; vi<numVoices; vi++){

    const p =
      document.getElementById(`c-${vi}-${prev}`);

    if(p) p.classList.remove('cursor');
  }

  const pd =
    document.getElementById(`mdot-${prev}`);

  if(pd) pd.classList.remove('on');

  const isBD = currentStep % spb === 0;
  const isTD = currentStep % spt === 0;

  if(isBD) playClick(true);
  else if(isTD) playClick(false);

  for(let vi=0; vi<numVoices; vi++){

    const el =
      document.getElementById(`c-${vi}-${currentStep}`);

    if(!el) continue;

    el.classList.add('cursor');

    /* illumina solo se attivo */
    if(grid[vi][currentStep]){
      flashStep(el);
    }
  }

  const cd =
    document.getElementById(`mdot-${currentStep}`);

  if(cd) cd.classList.add('on');

  currentStep =
    (currentStep + 1) % ts;
}

function startLoop(){

  tick();

  timerId =
    setInterval(tick, stepMs());
}

function stopLoop(){

  clearInterval(timerId);

  timerId = null;

  const ts = totalSteps();

  for(let vi=0; vi<numVoices; vi++){

    for(let si=0; si<ts; si++){

      const el =
        document.getElementById(`c-${vi}-${si}`);

      if(el){
        el.classList.remove('cursor');
        el.classList.remove('flash');
      }
    }
  }

  for(let si=0; si<ts; si++){

    const d =
      document.getElementById(`mdot-${si}`);

    if(d) d.classList.remove('on');
  }
}

function stop(){

  if(!playing) return;

  playing = false;

  stopLoop();

  const btn =
    document.getElementById('playBtn');

  btn.textContent = '▶';
  btn.classList.remove('running');
}

async function togglePlay(){

  await unlockAudio();

  playing = !playing;

  const btn =
    document.getElementById('playBtn');

  if(playing){

    btn.textContent = '■';

    btn.classList.add('running');

    currentStep = 0;

    startLoop();

  }else{

    btn.textContent = '▶';

    btn.classList.remove('running');

    stopLoop();
  }
}

function setBpm(v){

  bpm = parseInt(v);

  document.getElementById('bpmVal')
    .textContent = bpm;

  if(playing){

    stopLoop();

    currentStep = 0;

    startLoop();
  }
}

function setSubdiv(n){

  stop();

  subdiv = n;

  document
    .querySelectorAll('.subdiv-btn')
    .forEach(b => {

      b.classList.toggle(
        'active',
        parseInt(b.dataset.s) === n
      );
    });

  currentStep = 0;

  renderMetro();
  renderVoices();
}

/* INIT */

document
  .getElementById('playBtn')
  .addEventListener('click',togglePlay);

document
  .getElementById('bpmSlider')
  .addEventListener('input',e => {
    setBpm(e.target.value);
  });

document
  .querySelectorAll('.subdiv-btn')
  .forEach(b => {

    b.addEventListener('click',() => {
      setSubdiv(parseInt(b.dataset.s));
    });
  });

renderVoiceBtns();
renderStepBtns();
renderMetro();
renderVoices();

</script>

</body>
</html>
